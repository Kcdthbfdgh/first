<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness System</title>

<style>
<script src="app.js"></script>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1a1a1a, #2c2c2c);
    color: white;
}

/* Screens */
.screen {
    display: none;
    padding: 20px;
    text-align: center;
}

.active {
    display: block;
}

/* Buttons */
button {
    display: block;
    width: 80%;
    margin: 10px auto;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: #6c5ce7;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    background: #a29bfe;
}

/* Cards */
.card {
    background: rgba(255,255,255,0.05);
    padding: 15px;
    margin: 10px 0;
    border-radius: 12px;
    text-align: left;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    background: rgba(255,255,255,0.1);
}

/* Hidden content */
.details {
    display: none;
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.8;
}

/* Header */
.header {
    font-size: 18px;
    margin-bottom: 20px;
}
</style>
</head>

<body>

<!-- ONBOARDING: LEVEL -->
<div id="testScreen" class="screen active">
    <h1>Выбери уровень</h1>
    <button onclick="setLevel('beginner')">Начальный</button>
    <button onclick="setLevel('intermediate')">Средний</button>
    <button onclick="setLevel('advanced')">Продвинутый</button>
</div>

<!-- ONBOARDING: GOAL -->
<div id="goalScreen" class="screen">
    <h1>Твоя цель</h1>
    <button onclick="setGoal('glutes')">🍑 Ягодицы</button>
    <button onclick="setGoal('fatloss')">🔥 Похудение</button>
    <button onclick="setGoal('tone')">✨ Тонус</button>
</div>

<!-- APP -->
<div id="appScreen" class="screen">
    <div class="card">
    <strong>Прогресс</strong>
    <p id="progressText">0% выполнено</p>
    <button onclick="resetProgress()">Сбросить день</button>
    </div>
    <div class="header" id="levelBadge"></div>

    <h2>Тренировки</h2>

    <div class="card">
    <strong>Круговая тренировка</strong>

    <div class="details" style="display:block;">
        <label><input type="checkbox" onchange="updateProgress()"> Берпи</label><br>
        <label><input type="checkbox" onchange="updateProgress()"> Приседания с выпрыгиванием</label><br>
        <label><input type="checkbox" onchange="updateProgress()"> Пресс книжка</label><br>
        <label><input type="checkbox" onchange="updateProgress()"> Планка</label><br>
        <label><input type="checkbox" onchange="updateProgress()"> Стульчик</label><br>
    </div>
</div>
    <div class="card" onclick="toggleDetails(this)">
        <strong>Силовая тренировка ног</strong>
        <div class="details">
            <p>1. Выпады в смите</p>
            <p>2. Приседания</p>
            <p>3. Тяга вниз</p>
            <p>4. Ягодичный мост</p>
            <p>5. Болгарские выпады</p>
        </div>
    </div>

</div>

<script>
let userLevel = null;
let userGoal = null;

/* LEVEL */
function setLevel(level){
    userLevel = level;
    localStorage.setItem("level", level);

    document.getElementById("testScreen").classList.remove("active");
    document.getElementById("goalScreen").classList.add("active");
}

/* GOAL */
function setGoal(goal){
    userGoal = goal;
    localStorage.setItem("goal", goal);

    document.getElementById("goalScreen").classList.remove("active");
    document.getElementById("appScreen").classList.add("active");

    document.getElementById("levelBadge").innerText =
        "Уровень: " + userLevel + " | Цель: " + userGoal;
}

/* TOGGLE DETAILS */
function toggleDetails(card){
    let details = card.querySelector(".details");
    details.style.display = details.style.display === "block" ? "none" : "block";
}

/* AUTO LOAD */
window.onload = () => {
    let savedLevel = localStorage.getItem("level");
    let savedGoal = localStorage.getItem("goal");

    if(savedLevel && savedGoal){
        userLevel = savedLevel;
        userGoal = savedGoal;

        document.getElementById("testScreen").classList.remove("active");
        document.getElementById("goalScreen").classList.remove("active");
        document.getElementById("appScreen").classList.add("active");

        document.getElementById("levelBadge").innerText =
            "Уровень: " + savedLevel + " | Цель: " + savedGoal;
    }
};
</script>

</body>
</html>
