
<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fitness Premium App</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #0a0a0a;
    color: #fff;
}

/* Screens */
.screen {
    display: none;
    padding: 20px;
    animation: fadeIn 0.4s ease;
}
.active { display: block; }

/* Animation */
@keyframes fadeIn {
    from {opacity:0; transform:translateY(20px);}
    to {opacity:1; transform:translateY(0);}
}

/* Cards */
.card {
    background: rgba(255,255,255,0.05);
    border-radius: 16px;
    padding: 16px;
    margin: 12px 0;
    backdrop-filter: blur(10px);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-4px);
    background: rgba(255,255,255,0.08);
}

/* Buttons */
button {
    width: 100%;
    margin: 8px 0;
    padding: 14px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #6c5ce7, #a29bfe);
    color: white;
    font-size: 15px;
    cursor: pointer;
}

/* Details */
.details {
    display: none;
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.85;
}

/* Nav */
.nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-around;
    background: rgba(0,0,0,0.85);
    padding: 10px;
    backdrop-filter: blur(10px);
}

.nav button {
    width: auto;
    background: transparent;
    font-size: 18px;
}

/* Premium badge */
.badge {
    font-size: 12px;
    opacity: 0.7;
}
</style>
</head>

<body>

<!-- ONBOARDING -->
<div id="onboarding" class="screen active">
    <h2>Выбери уровень</h2>
    <button onclick="setLevel('beginner')">Начальный</button>
    <button onclick="setLevel('intermediate')">Средний</button>
    <button onclick="setLevel('advanced')">Продвинутый</button>
</div>

<!-- APP -->
<div id="app" class="screen">

    <div class="card">
        <h3>Твоя программа</h3>
        <p id="userInfo"></p>
        <span class="badge">Premium Fitness System</span>
    </div>

    <div id="workouts"></div>

</div>

<!-- NAV -->
<div class="nav">
    <button onclick="showWorkouts()">🏠</button>
    <button onclick="alert('Premium feature: progress tracking')">📊</button>
    <button onclick="alert('Premium feature: profile')">👤</button>
</div>

<script>

/* USER DATA */
let userLevel = null;

/* LEVEL */
function setLevel(level){
    userLevel = level;
    localStorage.setItem("level", level);

    document.getElementById("onboarding").classList.remove("active");
    document.getElementById("app").classList.add("active");

    document.getElementById("userInfo").innerText =
        "Уровень: " + level;

    renderWorkouts();
}

/* WORKOUT DATA */

        {name:"Стульчик", desc:"Статическое удержание у стены", muscle:"Квадрицепсы"},
        {name:"Альпинист", desc:"Поочерёдное подтягивание коленей в планке", muscle:"Пресс"},

        {name:"Разгибание ног", desc:"Работа квадрицепса", muscle:"Квадрицепсы"},
        {name:"Сгибание ног", desc:"Работа задней поверхности бедра", muscle:"Бицепс бедра"},
        {name:"Гиперэкстензия", desc:"Подъём корпуса с акцентом на ягодицы", muscle:"Спина"},
        {name:"Отведение ноги", desc:"Изолированная работа ягодиц", muscle:"Ягодицы"},

    ]

    ]
},
{
    title: "Руки и плечи",
    premium: true,
    exercises: [
        {name:"Отжимания", desc:"Контроль корпуса", muscle:"Грудь"},
        {name:"Жим гантелей", desc:"Толчок вверх", muscle:"Плечи"},
        {name:"Бицепс подъём", desc:"Сгибание рук", muscle:"Бицепс"},
        {name:"Французский жим", desc:"Трицепс", muscle:"Трицепс"},
        {name:"Разведение гантелей", desc:"Работа плеч", muscle:"Плечи"},

        {name:"Разгибание рук", desc:"Трицепс", muscle:"Трицепс"},
        {name:"Отжимания узкие", desc:"Трицепс", muscle:"Трицепс"}
    ]
}
];

/* RENDER */
function renderWorkouts(){
    let container = document.getElementById("workouts");
    container.innerHTML = "";

    workouts.forEach(w => {

        let card = document.createElement("div");
        card.className = "card";

        let html = `<h3>${w.title} ${w.premium ? "🔒" : ""}</h3>`;

        if(w.premium && userLevel !== "advanced"){
            html += `<p>Доступно только для Advanced уровня</p>`;
        } else {

            html += `<div class="details" style="display:block;">`;

            w.exercises.forEach(ex => {
                html += `
                    <div style="margin-bottom:10px;">
                        <strong>${ex.name}</strong><br>
                        <small>${ex.desc}</small><br>
                        <small>Мышцы: ${ex.muscle}</small>
                    </div>
                `;
            });

            html += `</div>`;
        }

        card.innerHTML = html;
        container.appendChild(card);
    });
}

/* NAV */
function showWorkouts(){
    alert("Already on workouts tab");
}

/* INIT */
window.onload = () => {
    let saved = localStorage.getItem("level");

    if(saved){
        setLevel(saved);
    }
};

</script>

</body>
</html>
